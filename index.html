<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <link rel="icon" type="image/webp" href="locantof1.webp">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
        }
        .bg-slider {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .bg-slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }
        .bg-slide.active {
            opacity: 1;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: 2;
        }
        .content-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .logo-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 25px;
            padding: 0 20px;
        }
        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
        }
        /* Powered by Locanto স্টাইল */
        .powered-by {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.85);
            margin-top: 8px;
            font-weight: 600;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        .powered-by span {
            color: #ffcc00; 
            font-weight: 800;
        }
        .text-line {
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1.1;
            margin: 8px 0;
            opacity: 0;
        }
        .text-many-holes {
            font-size: clamp(3.5rem, 8vw, 6rem);
            color: #fff;
            text-shadow: 0 0 10px #ff0055, 0 0 20px #ff0055, 0 0 40px #ff0055;
        }
        .slide-from-left {
            animation: slideLeft 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .text-waiting {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
        }
        .slide-from-right {
            animation: slideRight 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .text-free {
            font-size: clamp(4rem, 10vw, 8rem);
            color: #39ff14;
            text-shadow: 0 0 15px #39ff14, 0 0 30px #39ff14, 0 0 60px #39ff14;
            margin-bottom: 15px;
        }
        .slide-from-bottom {
            animation: slideBottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, 
                       megaShake 0.15s infinite alternate linear;
            animation-delay: 0s, 0.4s;
        }

        /* আকর্ষণীয় হলুদ বাটন স্টাইল */
        .cta-button {
            display: none;
            text-decoration: none;
            padding: 15px 40px;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 900;
            text-transform: uppercase;
            color: #000;
            background: linear-gradient(90deg, #ffea00 0%, #ffcc00 100%);
            background-size: 200% auto;
            border-radius: 50px;
            box-shadow: 0 0 20px #ffcc00, inset 0 0 10px rgba(255,255,255,0.6);
            cursor: pointer;
            border: none;
            outline: none;
            position: relative;
            z-index: 10;
            margin-bottom: 20px;
            transition: transform 0.2s;
        }
        
        /* বাটনের অনবরত নড়াচড়া (Animation) */
        .button-active {
            display: inline-block;
            animation: pulseNudge 1.5s infinite ease-in-out;
        }

        /* ক্লিক করার পর বাম থেকে ডানে লাল হওয়ার ইফেক্ট */
        .cta-button.clicked {
            animation: fillRed 1s linear forwards;
            pointer-events: none;
        }

        /* বাফারিং ও লোডিং টেক্সটের কন্টেইনার */
        .loader-wrapper {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
        }

        /* মিডিয়াম সাইজ ফেক বাফারিং */
        .fake-buffer {
            width: 60px;
            height: 60px;
            border: 6px solid #fff;
            border-top: 6px solid #ff0000;
            border-bottom: 6px solid #ff0000;
            border-radius: 50%;
            filter: drop-shadow(0 0 10px #ff0000);
            animation: spin 0.8s linear infinite;
        }

        /* লোডিং টেক্সট স্টাইল */
        .loading-text {
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 15px;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(255,255,255,0.6);
        }

        .buffer-active {
            display: flex !important;
        }

        @keyframes slideLeft {
            0% { transform: translateX(-150%) skewX(-20deg); opacity: 0; }
            100% { transform: translateX(0) skewX(0deg); opacity: 1; }
        }
        @keyframes slideRight {
            0% { transform: translateX(150%) skewX(20deg); opacity: 0; }
            100% { transform: translateX(0) skewX(0deg); opacity: 1; }
        }
        @keyframes slideBottom {
            0% { transform: translateY(150%) scale(0.5); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        @keyframes megaShake {
            0% { transform: translate(2px, 1px) rotate(0deg) scale(1); }
            20% { transform: translate(-1px, -2px) rotate(-1deg) scale(1.05); }
            40% { transform: translate(-3px, 0px) rotate(1deg) scale(1); }
            60% { transform: translate(0px, 2px) rotate(0deg) scale(1.05); }
            80% { transform: translate(1px, -1px) rotate(-1deg) scale(1); }
            100% { transform: translate(-1px, 2px) rotate(1deg) scale(1.08); }
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* বাটনের ভাইব্রেট ও পালস অ্যানিমেশন */
        @keyframes pulseNudge {
            0% { transform: scale(1) rotate(0deg); box-shadow: 0 0 20px #ffcc00; }
            25% { transform: scale(1.05) rotate(-1deg); }
            50% { transform: scale(1) rotate(1deg); box-shadow: 0 0 35px #ffea00; }
            75% { transform: scale(1.05) rotate(-1deg); }
            100% { transform: scale(1) rotate(0deg); box-shadow: 0 0 20px #ffcc00; }
        }
        /* বাম থেকে ডানে কালার পরিবর্তন */
        @keyframes fillRed {
            0% { background-position: 0% 50%; color: #000; }
            100% { background: #ff0000; color: #fff; box-shadow: 0 0 25px #ff0000; }
        }
    </style>
</head>
<body>

    <div class="bg-slider">
        <div class="bg-slide active" style="background-image: url('ki1.webp');"></div>
        <div class="bg-slide" style="background-image: url('ki2.webp');"></div>
        <div class="bg-slide" style="background-image: url('ki3.webp');"></div>
        <div class="bg-slide" style="background-image: url('ki4.webp');"></div>
        <div class="bg-slide" style="background-image: url('ki5.webp');"></div>
    </div>

    <div class="overlay"></div>

    <div class="content-container">
        <div class="logo-container">
            <img src="lgd1.webp" alt="Logo">
            <div class="powered-by">Powered by <span>Locanto</span></div>
        </div>

        <h1 id="text1" class="text-line text-many-holes">Many Holes</h1>
        <h2 id="text2" class="text-line text-waiting">Waiting For You</h2>
        <div id="text3" class="text-line text-free">Free</div>
        
        <!-- বাটন টেক্সট -->
        <button id="ctaBtn" class="cta-button">Get A Hole</button>
        
        <!-- নতুন বাফারিং ও লোডিং টেক্সট কন্টেইনার -->
        <div id="loaderWrapper" class="loader-wrapper">
            <div class="fake-buffer"></div>
            <div class="loading-text">Free Registration page Loading....</div>
        </div>
    </div>

    <script>
        const affiliateLink = "https://paysale.g2afse.com/click?pid=125904&offer_id=10417&sub1=Locanto";

        const slides = document.querySelectorAll('.bg-slide');
        let currentSlide = 0;

        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 1000);

        window.addEventListener('load', () => {
            const t1 = document.getElementById('text1');
            const t2 = document.getElementById('text2');
            const t3 = document.getElementById('text3');
            const btn = document.getElementById('ctaBtn');
            const loaderWrapper = document.getElementById('loaderWrapper');

            t1.classList.add('slide-from-left');

            setTimeout(() => {
                t2.classList.add('slide-from-right');
            }, 300);

            setTimeout(() => {
                t3.classList.add('slide-from-bottom');
                btn.classList.add('button-active');
            }, 600);

            btn.addEventListener('click', (e) => {
                e.preventDefault();
                
                btn.classList.remove('button-active');
                btn.classList.add('clicked');
                loaderWrapper.classList.add('buffer-active');

                setTimeout(() => {
                    window.location.replace(affiliateLink);
                }, 1000);
            });
        });
    </script>
</body>
</html>
